<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://nz.net.ultraq.thymeleaf"
      layout:decorate="~{/layout/layout}">
<head>
    <link rel="stylesheet" type="text/css" th:href="@{/css/main.css}">
    <title>Transfer</title>
</head>
<body>
<section layout:fragment="content">
    <div class="row">
        <div class="col-md-3 mt-3 ms-3">
            <h1 class="mb-3 text-center">Transfer</h1>
            <form method="post" th:action="@{/transactions/transfer}" th:object="${transferTransactionRequestDto}">
                <div class="mb-3">
                    <label for="accountId" class="form-label">Account</label>
                    <select id="accountId" name="accountId" class="form-select" th:field="*{accountId}" required>
                        <option value="" selected>Please choose...</option>
                        <option th:each="account : ${user.userAccounts}" th:value="${account.accountId}"
                                th:text="${account.accountNumber}"></option>
                    </select>
                    <span class="text-danger" th:if="${#fields.hasErrors('accountId')}" th:errors="*{accountId}"></span>
                </div>
                <div class="mb-3">
                    <label for="oppositeAccountNumber" class="form-label">Recipient</label>
                    <input th:field="*{oppositeAccountNumber}" type="text" class="form-control"
                           id="oppositeAccountNumber" name="oppositeAccountNumber" required>
                    <span class="text-danger" th:if="${#fields.hasErrors('oppositeAccountNumber')}"
                          th:errors="*{oppositeAccountNumber}"></span>
                </div>
                <div class="mb-3">
                    <label for="transactionAmount" class="form-label">Amount</label>
                    <input th:field="*{transactionAmount}" type="number" min="0" step="0.01" class="form-control"
                           id="transactionAmount" name="transactionAmount" required>
                    <span class="text-danger" th:if="${#fields.hasErrors('transactionAmount')}"
                          th:errors="*{transactionAmount}"></span>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn">Submit</button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
